##############################################################################
# Nginx config for dendo.in
# Copy this file to: /etc/nginx/sites-available/dendo.in
# Then: sudo ln -s /etc/nginx/sites-available/dendo.in /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo nginx -s reload
##############################################################################

server {
    listen 80;
    server_name dendo.in www.dendo.in;

    # Allow larger payloads (forms, file uploads)
    client_max_body_size 10M;

    client_body_timeout     60s;
    proxy_connect_timeout   60s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ── API proxy — forwards /api/* to the Node.js backend on port 5000 ──
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Serve the React frontend (dist/) for all other routes ──
    location / {
        root   /path/to/work-portfolio/my-app/dist;   # ← update to your actual dist path
        index  index.html;
        try_files $uri $uri/ /index.html;             # SPA fallback
    }
}

# HTTPS block — if you have SSL (Let's Encrypt / Certbot)
# After running: sudo certbot --nginx -d dendo.in -d www.dendo.in
# Certbot will auto-add/modify the SSL config below.
